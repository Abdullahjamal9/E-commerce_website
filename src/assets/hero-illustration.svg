<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <circle cx="300" cy="300" r="260" fill="url(#glow)"/>
  <circle cx="300" cy="300" r="190" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="2 10"/>

  <!-- Watch (top) -->
  <g transform="translate(300,90)">
    <circle r="46" fill="#ffffff" fill-opacity="0.06" filter="url(#soft)"/>
    <circle r="40" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="-10" y="-40" width="20" height="14" rx="4" fill="url(#brand)"/>
    <rect x="-10" y="26" width="20" height="14" rx="4" fill="url(#brand)"/>
    <circle r="22" fill="none" stroke="url(#brand)" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="-12" stroke="url(#brand)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="9" y2="5" stroke="url(#brand)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- T-shirt (right) -->
  <g transform="translate(478,300)">
    <circle r="50" fill="#ffffff" fill-opacity="0.06" filter="url(#soft)"/>
    <circle r="44" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <path d="M-22,-22 L-9,-30 C-4,-24 4,-24 9,-30 L22,-22 L17,-9 L11,-12 L11,24 C11,26 9,28 7,28 L-7,28 C-9,28 -11,26 -11,24 L-11,-12 L-17,-9 Z"
          fill="url(#brand)"/>
  </g>

  <!-- Sunglasses (bottom) -->
  <g transform="translate(300,510)">
    <circle r="46" fill="#ffffff" fill-opacity="0.06" filter="url(#soft)"/>
    <circle r="40" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <path d="M-26,-2 C-26,-9 -20,-13 -14,-13 L-4,-13 C-1,-13 1,-11 1,-8 C1,-11 3,-13 6,-13 L16,-13 C22,-13 28,-9 28,-2 C28,6 22,11 15,11 C8,11 3,7 1,1 C-1,7 -6,11 -13,11 C-20,11 -26,6 -26,-2 Z"
          fill="url(#brand)"/>
    <line x1="1" y1="-9" x2="1" y2="-5" stroke="url(#brand)" stroke-width="3"/>
    <line x1="-26" y1="-6" x2="-34" y2="-10" stroke="url(#brand)" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="-6" x2="36" y2="-10" stroke="url(#brand)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Sneaker (left) -->
  <g transform="translate(122,300)">
    <circle r="50" fill="#ffffff" fill-opacity="0.06" filter="url(#soft)"/>
    <circle r="44" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <path d="M-26,16 C-26,16 -24,4 -16,0 C-9,-4 -4,-12 4,-15 C9,-17 13,-15 15,-11 L20,-11 C24,-11 26,-8 26,-4 L26,12 C26,15 24,17 21,17 L-22,17 C-25,17 -26,17 -26,16 Z"
          fill="url(#brand)"/>
    <line x1="-6" y1="-10" x2="-1" y2="-2" stroke="#0b0c14" stroke-opacity="0.35" stroke-width="2" stroke-linecap="round"/>
    <line x1="1" y1="-12" x2="6" y2="-4" stroke="#0b0c14" stroke-opacity="0.35" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Center socket — the real brand logo is layered on top via React -->
  <g transform="translate(300,300)">
    <circle r="88" fill="#ffffff" fill-opacity="0.07" filter="url(#soft)"/>
    <circle r="76" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
  </g>
</svg>
